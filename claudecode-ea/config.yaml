name: Claude Code EA
description: >-
  Telegram bot powered by Claude Code native channels.
  Runs Claude Code CLI with the Telegram channel plugin as a Home Assistant add-on.
version: "1.0.9"
slug: claudecode-ea
url: "https://github.com/maksyms/ha-addons"
arch:
  - aarch64
  - armv7
init: false
stdin: true
startup: application
boot: auto
map:
  - share:rw
options:
  TELEGRAM_BOT_TOKEN: ""
  DANGEROUS_MODE: "false"
  ONEDRIVE_PROJECTS_PATH: ""
  RCLONE_SYNC_INTERVAL: "300"
  ONEDRIVE_MCP_ENABLED: "true"
  AZURE_CLIENT_ID: ""
schema:
  TELEGRAM_BOT_TOKEN: str
  DANGEROUS_MODE: str?
  ONEDRIVE_PROJECTS_PATH: str?
  RCLONE_SYNC_INTERVAL: str?
  ONEDRIVE_MCP_ENABLED: str?
  AZURE_CLIENT_ID: str?
