name: Paperless-GPT
description: >-
  AI-powered document organizer for Paperless-ngx.
  Generates titles, tags, correspondents, and dates using LLMs.
version: "1.0.4"
slug: paperless-gpt
url: "https://github.com/maksyms/ha-addons"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8080
panel_icon: mdi:file-document-edit
ports:
  8080/tcp: null
ports_description:
  8080/tcp: Web interface
map:
  - addon_config:rw
  - share:rw
options:
  paperless_base_url: "http://23930cf1-paperless-ngx:8000"
  paperless_api_token: ""
  paperless_manual_tag: "paperless-gpt"
  paperless_auto_tag: "paperless-gpt-auto"
  llm_provider: "anthropic"
  llm_model: "claude-sonnet-4-6"
  ocr_provider: "llm"
  vision_llm_provider: "anthropic"
  vision_llm_model: "claude-sonnet-4-6"
schema:
  paperless_base_url: str
  paperless_api_token: str
  paperless_manual_tag: str?
  paperless_auto_tag: str?
  llm_provider: str
  llm_model: str
  openai_api_key: str?
  openai_api_type: str?
  openai_base_url: str?
  ollama_host: str?
  token_limit: int?
  llm_language: str?
  mistral_api_key: str?
  anthropic_api_key: str?
  googleai_api_key: str?
  googleai_thinking_budget: int?
  ocr_provider: str?
  vision_llm_provider: str?
  vision_llm_model: str?
  azure_docai_endpoint: str?
  azure_docai_key: str?
  google_project_id: str?
  google_location: str?
  google_processor_id: str?
  docling_url: str?
  ocr_limit_pages: int?
  create_local_hocr: bool?
  local_hocr_path: str?
  create_local_pdf: bool?
  local_pdf_path: str?
  pdf_upload: bool?
  pdf_replace: bool?
  pdf_copy_metadata: bool?
  pdf_ocr_tagging: bool?
  pdf_ocr_complete_tag: str?
  pdf_skip_existing_ocr: bool?
  auto_ocr_tag: str?
  auto_generate_title: bool?
  auto_generate_tags: bool?
  auto_generate_correspondents: bool?
  auto_generate_created_date: bool?
  auto_generate_document_type: bool?
  create_new_tags: bool?
  correspondent_black_list: str?
  vision_llm_max_tokens: int?
  vision_llm_temperature: float?
  vision_llm_requests_per_minute: int?
  vision_llm_max_retries: int?
  llm_requests_per_minute: int?
  ocr_process_mode: str?
  image_max_pixel_dimension: int?
  image_max_render_dpi: int?
  log_level: str?
  listen_interface: str?
