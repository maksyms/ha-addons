name: Auto Analyst
description: >-
  Monitors a Telegram chat for tweet links, fetches content,
  sends it for critical analysis, and posts the result back.
version: "1.0.6"
slug: autoanalyst
url: "https://github.com/maksyms/ha-addons"
arch:
  - aarch64
  - armv7
init: false
stdin: true
startup: application
boot: auto
options:
  TELEGRAM_API_ID: ""
  TELEGRAM_API_HASH: ""
  TELEGRAM_PEER_ID: ""
  ANTHROPIC_API_KEY: ""
  X_BEARER_TOKEN: ""
  CLAUDE_MODEL: "claude-sonnet-4-20250514"
  ANALYZE_OWN: "false"
  ANALYSIS_BACKEND: "claude"
  PERPLEXITY_API_KEY: ""
  PERPLEXITY_MODEL: "sonar-pro"
  OPENAI_API_KEY: ""
schema:
  TELEGRAM_API_ID: str
  TELEGRAM_API_HASH: str
  TELEGRAM_PEER_ID: str
  ANTHROPIC_API_KEY: str?
  X_BEARER_TOKEN: str?
  CLAUDE_MODEL: str?
  ANALYZE_OWN: str?
  ANALYSIS_BACKEND: str?
  PERPLEXITY_API_KEY: str?
  PERPLEXITY_MODEL: str?
  OPENAI_API_KEY: str?
